default:
  image: node:24-bookworm
  interruptible: true

variables:
  PNPM_HOME: '$CI_PROJECT_DIR/.pnpm-store'
  npm_config_cache: '$CI_PROJECT_DIR/.npm'

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - install
  - check
  - build

.pnpm-cache: &pnpm-cache
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store/
    - node_modules/
    - packages/*/node_modules/

.setup: &setup
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.33.1 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

install:
  stage: install
  cache:
    <<: *pnpm-cache
    policy: pull-push
  <<: *setup
  script:
    - pnpm -v
    - node -v
    - echo "Dependencies installed."

lint:
  stage: check
  needs: [install]
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script:
    - pnpm lint

typecheck:
  stage: check
  needs: [install]
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script:
    - pnpm typecheck

test:
  stage: check
  needs: [install]
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script:
    - pnpm test
  coverage: '/Statements\s+:\s+(\d+\.\d+)%/'

build:
  stage: build
  needs: [lint, typecheck, test]
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script:
    - pnpm build
  artifacts:
    name: 'web-dist-$CI_COMMIT_SHORT_SHA'
    paths:
      - packages/web/dist/
    expire_in: 14 days
