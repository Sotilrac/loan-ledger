default:
  image: node:24-bookworm
  interruptible: true

variables:
  PNPM_HOME: '$CI_PROJECT_DIR/.pnpm-store'
  npm_config_cache: '$CI_PROJECT_DIR/.npm'

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - install
  - check
  - build
  - deploy

.pnpm-cache: &pnpm-cache
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store/
    - node_modules/
    - packages/*/node_modules/

.setup: &setup
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.33.1 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

install:
  stage: install
  cache:
    <<: *pnpm-cache
    policy: pull-push
  <<: *setup
  script:
    - pnpm -v
    - node -v
    - echo "Dependencies installed."

lint:
  stage: check
  needs: [install]
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script:
    - pnpm lint

typecheck:
  stage: check
  needs: [install]
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script:
    - pnpm typecheck

test:
  stage: check
  needs: [install]
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script:
    - pnpm test
  coverage: '/Statements\s+:\s+(\d+\.\d+)%/'

# PHP-side checks for the Nextcloud app. Runs in its own image so the JS
# pipeline above doesn't pay PHP install costs. Job is skipped on commits
# that don't touch the Nextcloud package.
.nc-php-base: &nc-php-base
  image: php:8.2-cli
  before_script:
    - apt-get update -q
    - apt-get install -y -q git unzip libzip-dev
    - docker-php-ext-install zip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - cd packages/nextcloud
    - composer install --no-progress
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - packages/nextcloud/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_TAG

ci-nextcloud-php-test:
  stage: check
  needs: []
  <<: *nc-php-base
  script:
    - composer test

ci-nextcloud-php-lint:
  stage: check
  needs: []
  <<: *nc-php-base
  script:
    - composer cs:check
    - composer psalm

build:
  stage: build
  needs: [lint, typecheck, test]
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script:
    - pnpm build
  artifacts:
    name: 'web-dist-$CI_COMMIT_SHORT_SHA'
    paths:
      - packages/web/dist/
    expire_in: 14 days

# Deploy the web bundle to Cloudflare Pages on every push to the default
# branch. Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID as masked
# CI variables.
deploy:cloudflare:
  stage: deploy
  needs: [build]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script:
    - pnpm run deploy:pages

# Publish the Nextcloud app to the App Store on `nc-vX.Y.Z` tags, in two jobs:
#
#   nextcloud-package  builds + signs the tarball and keeps it as a permanent
#                      public CI artifact.
#   release:nextcloud  (needs the package) creates a GitLab Release linking
#                      that artifact, then submits its public URL to the App
#                      Store. The App Store fetches `download` to verify the
#                      signature, so the file must be reachable *before* the
#                      POST — which is why this is a second job: by the time it
#                      runs, the package job's artifact URL is live. (GitLab's
#                      `release:` keyword can't help here: it runs after the
#                      job's script, i.e. after the POST.)
#
# Requires two CI variables:
#   - NC_SIGNING_KEY    (file): the private key paired with your registered cert
#   - NC_APPSTORE_TOKEN (variable, masked): API token from
#       https://apps.nextcloud.com/account/token. Token auth is required for
#       accounts that sign in via GitHub (no password to use for basic auth).
nextcloud-package:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG =~ /^nc-v\d+\.\d+\.\d+$/
  image: node:24-bookworm
  variables:
    APP_VERSION: '${CI_COMMIT_TAG#nc-v}'
    OUT_DIR: dist
  before_script:
    - apt-get update -q
    - apt-get install -y -q php-cli php-xml php-zip php-mbstring composer rsync libxml2-utils curl openssl
    - corepack enable
    - corepack prepare pnpm@10.33.1 --activate
    - pnpm install --frozen-lockfile
    # --no-scripts: the post-install-cmd runs the bamarni bin plugin, a dev-only
    # dep that isn't present under --no-dev. --working-dir avoids cd so later
    # steps keep resolving paths from the repo root.
    - composer install --no-progress --no-dev --no-scripts --working-dir=packages/nextcloud
    - pnpm --filter @loan-ledger/nextcloud build
  script:
    # Validate info.xml against the live App Store schema before packaging.
    - curl -s https://apps.nextcloud.com/schema/apps/info.xsd -o /tmp/info.xsd
    - xmllint --schema /tmp/info.xsd packages/nextcloud/appinfo/info.xml --noout
    # Stage runtime files and pack.
    - mkdir -p $OUT_DIR/loanledger
    - rsync -a --exclude-from=packages/nextcloud/.nextcloudignore
      --exclude=node_modules --exclude=tests --exclude=src
      packages/nextcloud/ $OUT_DIR/loanledger/
    - TAR_NAME="loanledger-${APP_VERSION}.tar.gz"
    - tar -czf "$OUT_DIR/$TAR_NAME" -C "$OUT_DIR" loanledger
    - openssl dgst -sha512 -sign "$NC_SIGNING_KEY" "$OUT_DIR/$TAR_NAME" | base64 -w0 > "$OUT_DIR/$TAR_NAME.sig"
  artifacts:
    name: 'loanledger-$CI_COMMIT_TAG'
    paths:
      - $OUT_DIR/loanledger-*.tar.gz
      - $OUT_DIR/loanledger-*.tar.gz.sig
    expire_in: never

release:nextcloud:
  stage: deploy
  needs: ['nextcloud-package']
  rules:
    - if: $CI_COMMIT_TAG =~ /^nc-v\d+\.\d+\.\d+$/
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  variables:
    APP_VERSION: '${CI_COMMIT_TAG#nc-v}'
    OUT_DIR: dist
  before_script:
    - apk add --no-cache curl jq
  script:
    - TAR_NAME="loanledger-${APP_VERSION}.tar.gz"
    - SIG=$(cat "$OUT_DIR/$TAR_NAME.sig")
    # Public, no-auth URL for the package job's artifact. Resolves to the file
    # once that job has succeeded (it has, since we `need` it).
    - DOWNLOAD="${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/${OUT_DIR}/${TAR_NAME}?job=nextcloud-package"
    # GitLab Release for humans, linking the same file.
    - |
      release-cli create --name "Nextcloud app $CI_COMMIT_TAG" --tag-name "$CI_COMMIT_TAG" \
        --description "Loan Ledger Nextcloud app release $CI_COMMIT_TAG" \
        --assets-link "{\"name\":\"${TAR_NAME}\",\"url\":\"${DOWNLOAD}\",\"link_type\":\"package\"}"
    # Submit to the App Store; print the response body so failures are legible.
    - |
      CODE=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X POST \
        -H 'Content-Type: application/json' \
        -H "Authorization: Token ${NC_APPSTORE_TOKEN}" \
        https://apps.nextcloud.com/api/v1/apps/releases \
        -d "$(jq -n --arg url "$DOWNLOAD" --arg sig "$SIG" '{download: $url, signature: $sig, nightly: false}')")
      echo "App Store responded HTTP $CODE:"; cat /tmp/resp.json; echo
      case "$CODE" in 200|201) ;; *) exit 1 ;; esac
