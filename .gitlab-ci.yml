default:
  image: node:24-bookworm
  interruptible: true

variables:
  PNPM_HOME: '$CI_PROJECT_DIR/.pnpm-store'
  npm_config_cache: '$CI_PROJECT_DIR/.npm'

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - install
  - check
  - build
  - deploy

.pnpm-cache: &pnpm-cache
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store/
    - node_modules/
    - packages/*/node_modules/

.setup: &setup
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.33.1 --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

install:
  stage: install
  cache:
    <<: *pnpm-cache
    policy: pull-push
  <<: *setup
  script:
    - pnpm -v
    - node -v
    - echo "Dependencies installed."

lint:
  stage: check
  needs: [install]
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script:
    - pnpm lint

typecheck:
  stage: check
  needs: [install]
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script:
    - pnpm typecheck

test:
  stage: check
  needs: [install]
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script:
    - pnpm test
  coverage: '/Statements\s+:\s+(\d+\.\d+)%/'

# PHP-side checks for the Nextcloud app. Runs in its own image so the JS
# pipeline above doesn't pay PHP install costs. Job is skipped on commits
# that don't touch the Nextcloud package.
.nc-php-base: &nc-php-base
  image: php:8.2-cli
  before_script:
    - apt-get update -q
    - apt-get install -y -q git unzip libzip-dev
    - docker-php-ext-install zip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - cd packages/nextcloud
    - composer install --no-progress
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - packages/nextcloud/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_TAG

ci-nextcloud-php-test:
  stage: check
  needs: []
  <<: *nc-php-base
  script:
    - composer test

ci-nextcloud-php-lint:
  stage: check
  needs: []
  <<: *nc-php-base
  script:
    - composer cs:check
    - composer psalm

build:
  stage: build
  needs: [lint, typecheck, test]
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script:
    - pnpm build
  artifacts:
    name: 'web-dist-$CI_COMMIT_SHORT_SHA'
    paths:
      - packages/web/dist/
    expire_in: 14 days

# Deploy the web bundle to Cloudflare Pages on every push to the default
# branch. Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID as masked
# CI variables.
deploy:cloudflare:
  stage: deploy
  needs: [build]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  cache:
    <<: *pnpm-cache
    policy: pull
  <<: *setup
  script:
    - pnpm run deploy:pages
