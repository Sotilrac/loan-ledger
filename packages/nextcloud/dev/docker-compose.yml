services:
  nextcloud:
    # Override the NC major to test the lower end of the supported range:
    #   NC_IMAGE=nextcloud:31-apache NC_PORT=8081 \
    #     docker compose -p loanledger-nc31 -f dev/docker-compose.yml up -d
    # A distinct `-p` project gives a clean, isolated volume so NC installs
    # fresh at that version instead of refusing to downgrade the data dir.
    image: ${NC_IMAGE:-nextcloud:33-apache}
    container_name: ${NC_CONTAINER:-loanledger-nc-dev}
    ports:
      # Visit http://localhost:8080. First boot takes ~30s while NC installs
      # itself; you can `docker compose logs -f` to watch.
      - '${NC_PORT:-8080}:80'
    volumes:
      # Named volume keeps NC core + user data across restarts.
      - nextcloud-data:/var/www/html
      # Bind-mount the app so file changes show up immediately. Re-run
      # `make nc-build` from the host to refresh the JS bundle.
      - ../:/var/www/html/custom_apps/loanledger
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      NEXTCLOUD_TRUSTED_DOMAINS: localhost
      # SQLite for dev. Both NEXTCLOUD_ADMIN_* and SQLITE_DATABASE must be
      # set on first launch or the entrypoint skips the unattended install
      # and waits for the web-installer wizard.
      SQLITE_DATABASE: nextcloud
    restart: unless-stopped

volumes:
  nextcloud-data:
